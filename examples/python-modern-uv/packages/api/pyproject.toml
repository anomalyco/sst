[project]
name = "api"
version = "0.1.0"
description = "API package with uv package mode"
dependencies = ["requests>=2.31.0", "shared"]
requires-python = ">=3.11"

[tool.uv]
package = true

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
